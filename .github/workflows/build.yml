name: Build Apps

on:
  push:
    tags: ["v*"]
  workflow_dispatch:   # Actions tab 手動撳掣都 build 到

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest      # Apple Silicon
            name: mac-arm64
          - os: macos-13          # Intel Mac
            name: mac-intel
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps (CPU torch，包細啲)
        run: |
          python -m pip install -U pip setuptools wheel
          pip install cython numpy
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install ultralytics opencv-python-headless lap gradio onnxruntime rawpy
          pip install insightface --no-build-isolation
          pip install pyinstaller
        shell: bash

      - name: Build with PyInstaller
        run: >
          pyinstaller launcher.py --name FancamStudio --onedir --noconfirm
          --add-data "botsort_reid.yaml:."
          --add-data "app.py:."
          --add-data "fancam_core.py:."
          --add-data "ingest.py:."
          --hidden-import ingest
          --collect-all gradio
          --collect-all gradio_client
          --collect-all safehttpx
          --collect-all groovy
          --collect-all ultralytics
          --collect-all insightface
          --collect-all rawpy
          --collect-data onnxruntime
          --hidden-import scipy.special._cdflib
        shell: bash

      - name: Ad-hoc codesign (mac)
        if: runner.os == 'macOS'
        run: |
          find dist/FancamStudio -type f \( -name "*.so" -o -name "*.dylib" \) \
            -exec codesign --force -s - {} \;
          codesign --force -s - dist/FancamStudio/FancamStudio

      - name: Add fix.command helper (mac)
        if: runner.os == 'macOS'
        run: |
          cat > dist/FancamStudio/fix.command <<'SH'
          #!/bin/bash
          # 雙擊：清 quarantine + 重簽 + 開 app（所有輸出寫入 debug_log.txt）
          DIR="$(cd "$(dirname "$0")" && pwd)"
          xattr -cr "$DIR"
          find "$DIR" -type f \( -name "*.so" -o -name "*.dylib" \) -exec codesign --force -s - {} \; 2>/dev/null
          codesign --force -s - "$DIR/FancamStudio"
          echo "✅ 修復完成，啟動中…（如果 app 死咗，開 debug_log.txt 睇死因）"
          "$DIR/FancamStudio" 2>&1 | tee "$DIR/debug_log.txt"
          SH
          chmod +x dist/FancamStudio/fix.command

      - name: Zip (mac)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/FancamStudio FancamStudio-${{ matrix.name }}.zip

      - name: Zip (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/FancamStudio -DestinationPath FancamStudio-windows.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: FancamStudio-${{ matrix.name }}
          path: FancamStudio-*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: FancamStudio-*.zip
