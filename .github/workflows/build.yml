name: Build Apps

on:
  push:
    tags: ["v*"]
  workflow_dispatch:   # 都可以喺 Actions tab 手動撳掣 build

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest      # Apple Silicon
            name: mac-arm64
          - os: macos-13          # Intel Mac
            name: mac-intel
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps (CPU torch，包細啲)
        run: |
          python -m pip install -U pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller launcher.py --name FancamStudio --onedir --noconfirm
          --add-data "botsort_reid.yaml:."
          --add-data "app.py:."
          --add-data "fancam_core.py:."
          --collect-all gradio
          --collect-all gradio_client
          --collect-all safehttpx
          --collect-all groovy
          --collect-all ultralytics
          --collect-all insightface
          --collect-data onnxruntime
          --hidden-import scipy.special._cdflib
        shell: bash
      - name: Ad-hoc codesign (mac)
        if: runner.os == 'macOS'
        run: codesign --force --deep -s - dist/FancamStudio
      - name: Zip (mac)
        if: runner.os == 'macOS'
        run: cd dist && zip -rq ../FancamStudio-${{ matrix.name }}.zip FancamStudio

      - name: Zip (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/FancamStudio -DestinationPath FancamStudio-windows.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: FancamStudio-${{ matrix.name }}
          path: FancamStudio-*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: FancamStudio-*.zip
